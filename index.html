<!DOCTYPE html>
<html>
<head>
  <title>WA.io</title>
</head>
<body>
  <h1>WA.io Mining App</h1>

  <p>Balance: 0 WA</p>

  <button onclick="mine()">
    Start Mining
  </button>

  <script>
    let balance = 0;

    function mine() {
      balance += 1;
      document.querySelector("p").innerText =
        "Balance: " + balance + " WA";
    }
  </script>
</body>
</html>
